name: Go Fix

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fix:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run Go Fix
        run: |
          test -z "$(go fix -diff ./...)"
